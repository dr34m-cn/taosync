name: 构建Android

on:
  push:
    branches: [ 'main' ]
    paths: [ 'version.txt' ]
  workflow_dispatch:

env:
  APP_NAME: taoSync
  BUILDOZER_SPEC: buildozer.spec
  # p4a 2024.01.21 的 python3 recipe 默认使用 Python 3.11.5，
  # 在 Android 上稳定运行；p4a 2026.5.9 强制 Python 3.14.2 会触发
  # FORTIFY: pthread_mutex_lock called on a destroyed mutex 崩溃。
  P4A_VERSION: 2024.01.21
  CACHE_VERSION: v6

jobs:
  get-version:
    name: 获取版本号
    runs-on: ubuntu-latest
    outputs:
      VERSION: ${{ steps.getVersion.outputs.VERSION }}

    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - id: getVersion
        name: 获取版本号
        run: |
          versions=$(head -n 1 version.txt)
          IFS=',' read -ra versionList <<< "$versions"
          cuVersion="${versionList[0]}"
          echo "VERSION=$cuVersion" >> "$GITHUB_OUTPUT"
  build-frontend:
    name: 构建前端
    runs-on: ubuntu-latest
    needs: [ get-version ]
    env:
      VERSION: ${{ needs.get-version.outputs.VERSION }}
    # 仅在非 dev 版本构建
    if: ${{ !contains(needs.get-version.outputs.VERSION, 'dev') }}

    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 安装Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "14.x"

      - name: 注入版本号并构建前端
        run: |
          sed -i "s/__version_placeholder__/$VERSION/g" frontend/src/views/page/setting/index.vue
          cd frontend
          npm install
          npm run build
      - name: 上传artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  build-android:
    name: 构建android
    runs-on: ubuntu-latest
    needs: [ get-version, build-frontend ]
    env:
      VERSION: ${{ needs.get-version.outputs.VERSION }}
    # 仅在非 dev 版本构建 apk
    if: ${{ !contains(needs.get-version.outputs.VERSION, 'dev') }}

    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 下载前端构建产物
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: 准备前端资源 front/
        run: |
          # 桌面端 PyInstaller 将 frontend/dist 映射为 front/，Android 保持一致
          cp -r frontend/dist front
          ls front/index.html
      - name: 设置python环境
        uses: actions/setup-python@v5
        with:
          # 宿主 Python 与目标 Python 保持一致（3.11），避免 host/target ABI 不匹配
          python-version: '3.11'

      - name: 安装系统依赖
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            autoconf automake libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libffi-dev libssl-dev libsqlite3-dev libbz2-dev libreadline-dev \
            libportaudio2 libportaudiocpp0 \
            libltdl-dev libtool-bin \
            ccache git wget unzip zip \
            openjdk-17-jdk build-essential
          sudo ln -sf $(which python3) /usr/bin/python
          # libffi 的 configure.ac 用到 LT_SYS_SYMBOL_USCORE 等宏，
          # 需让 autoconf 能找到 libtool 提供的 m4 文件，否则 autoreconf 失败。
          echo "ACLOCAL_PATH=/usr/share/aclocal" >> $GITHUB_ENV
          autoreconf --version
          libtool --version
      - name: 配置Java环境变量
        run: |
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
          echo "$JAVA_HOME/bin" >> $GITHUB_PATH
      - name: 安装 Buildozer 与 python-for-android
        run: |
          python -m pip install --upgrade pip
          # buildozer 1.5.0 与 p4a 2024.01.21 同期发布，API 兼容。
          # 注意：buildozer 构建时会自己从 git 克隆 p4a（由 buildozer.spec 中
          # p4a.branch = v2024.01.21 控制），pip 安装的 p4a 仅用于命令行工具。
          python -m pip install "buildozer==1.5.0" "python-for-android==${P4A_VERSION}" "Cython==0.29.34" virtualenv
          python -c "import pythonforandroid; print('p4a version:', pythonforandroid.__version__)"
          p4a create --help > /dev/null 2>&1 || true
      - name: 缓存 Buildozer 全局目录
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.gradle
            /opt/android-sdk
          key: buildozer-${{ runner.os }}-${{ env.CACHE_VERSION }}-p4a${{ env.P4A_VERSION }}-py311-${{ hashFiles('buildozer.spec', 'requirements.txt') }}
          restore-keys: |
            buildozer-${{ runner.os }}-${{ env.CACHE_VERSION }}-p4a${{ env.P4A_VERSION }}-py311-
      - name: 清理旧构建产物（彻底清除 p4a 2026.5.9 的 Python 3.14 脏缓存）
        run: |
          echo "=== 彻底清理旧 p4a 编译产物 ==="
          rm -rf ~/.buildozer/android/platform/build-* 2>/dev/null || true
          rm -rf ~/.buildozer/android/platform/python-for-android 2>/dev/null || true
          rm -rf ~/.buildozer/android/platform/build 2>/dev/null || true
          rm -rf ~/.buildozer/android/app 2>/dev/null || true
          rm -rf ~/.buildozer/android/dists 2>/dev/null || true
          rm -rf ~/.buildozer/cache 2>/dev/null || true
          rm -rf ~/.buildozer/venv 2>/dev/null || true
          rm -rf ~/.buildozer/.local 2>/dev/null || true
          rm -rf ~/.buildozer/state 2>/dev/null || true

          echo "=== 清理本地工作目录构建缓存 ==="
          rm -rf .buildozer 2>/dev/null || true
          rm -rf bin 2>/dev/null || true
          rm -rf .python-for-android 2>/dev/null || true

          echo "清理完成"
      - name: 检查 buildozer.spec 是否存在
        id: checkSpec
        run: |
          if [ -f "$BUILDOZER_SPEC" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "::error::未找到 $BUILDOZER_SPEC，无法构建 APK。"
            exit 1
          fi
      - name: 切换 Android 入口
        if: steps.checkSpec.outputs.exists == 'true'
        run: |
          # python-for-android 默认以 main.py 为入口；
          # 桌面端 main.py 是 Tornado 服务，Android 使用 main_android.py。
          cp main.py main.py.bak
          cp main_android.py main.py
          echo "已将 main_android.py 复制为 main.py（原 main.py 备份为 main.py.bak）"
      - name: 注入版本号到 buildozer.spec
        if: steps.checkSpec.outputs.exists == 'true'
        run: |
          # version.txt 形如 v0.3.2，p4a build.py 按 '.' 拆分后逐段 int()，
          # 遇到 'v0' 会抛 ValueError，故去掉前导 v。
          ver_num="${VERSION#v}"
          sed -i "s/^version = .*/version = $ver_num/" "$BUILDOZER_SPEC"
          # version_code 必须是纯整数：取 主.次.补 三段，去掉非数字后段，拼成补零整数
          IFS='.' read -r major minor patch <<< "$ver_num"
          major="${major%%[!0-9]*}"; major="${major:-0}"
          minor="${minor%%[!0-9]*}"; minor="${minor:-0}"
          patch="${patch%%[!0-9]*}"; patch="${patch:-0}"
          numeric_version=$(( major*10000 + minor*100 + patch ))
          # 写入/替换 android.numeric_version
          if grep -q "^android.numeric_version" "$BUILDOZER_SPEC"; then
            sed -i "s/^android.numeric_version = .*/android.numeric_version = $numeric_version/" "$BUILDOZER_SPEC"
          else
            printf '\nandroid.numeric_version = %s\n' "$numeric_version" >> "$BUILDOZER_SPEC"
          fi
          echo "version=$ver_num numeric_version=$numeric_version"
          grep -E "^(version|android.numeric_version)" "$BUILDOZER_SPEC"
      - name: 编译 Android Debug APK
        if: steps.checkSpec.outputs.exists == 'true'
        # 抑制 requests 的 RequestsDependencyWarning：
        # pip --target 安装时，chardet 已下载到目标目录但不在 sys.path，
        # requests/setup.py 执行时 import chardet 失败而发警告。
        # chardet 实际已打包进 APK，运行时可正常导入。
        run: PYTHONWARNINGS="ignore:Unable to find acceptable character detection:UserWarning" buildozer -v android debug
      - name: 重命名 APK
        if: steps.checkSpec.outputs.exists == 'true'
        run: |
          mkdir -p dist
          apk_path=$(ls bin/*.apk 2>/dev/null | head -n 1)
          if [ -n "$apk_path" ]; then
            cp "$apk_path" "dist/${APP_NAME}-${VERSION}-android-debug.apk"
          else
            echo "::error::未找到编译产物 APK"
            exit 1
          fi
      - name: 上传artifact
        if: steps.checkSpec.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: dist-android
          path: dist/*.apk
          retention-days: 7
          # apk 本身已是 zip 压缩格式，二次压缩无意义且拖慢上传，设为 0 仅打包不压缩
          compression-level: 0

  create-release:
    name: 发布release
    runs-on: ubuntu-latest
    needs: [get-version, build-android]
    env:
      VERSION: ${{ needs.get-version.outputs.VERSION }}
    # 仅在非 dev 版本发布
    if: ${{ !contains(needs.get-version.outputs.VERSION, 'dev') }}

    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 检查 release 标签是否存在
        id: checkTag
        run: |
          if [ -n "$(git ls-remote --tags origin "refs/tags/${VERSION}")" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "release 标签 ${VERSION} 已存在，将更新产物"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "release 标签 ${VERSION} 不存在，跳过发布"
          fi

      - name: 下载构建结果
        if: steps.checkTag.outputs.exists == 'true'
        uses: actions/download-artifact@v4
        with:
          name: dist-android
          path: dist

      - name: 更新 APK 到 release
        if: steps.checkTag.outputs.exists == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          files: dist/*

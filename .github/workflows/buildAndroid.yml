name: buildAndroid

on:
  workflow_dispatch:

env:
  APP_NAME: taoSync

jobs:
  get-version:
    name: 获取版本号
    runs-on: ubuntu-latest
    outputs:
      VERSION: ${{ steps.getVersion.outputs.VERSION }}
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4
      - id: getVersion
        run: |
          versions=$(head -n 1 version.txt)
          IFS=',' read -ra versionList <<< "$versions"
          echo "VERSION=${versionList[0]}" >> "$GITHUB_OUTPUT"

  build-frontend:
    name: 构建前端
    runs-on: ubuntu-latest
    needs: [ get-version ]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "14.x"
      - run: |
          sed -i "s/__version_placeholder__/${{ needs.get-version.outputs.VERSION }}/g" frontend/src/views/page/setting/index.vue
          cd frontend && npm install && npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  build-android:
    name: 构建Android (PIE)
    runs-on: ubuntu-latest
    needs: [ get-version, build-frontend ]
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 下载前端产物
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: 设置 QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: 准备输出目录权限
        run: |
          mkdir -p dist/android-arm64 build/android-arm64
          chmod -R 777 dist build

      # Android 使用 bionic libc，不兼容 staticx（仅支持 glibc），
      # 因此这里只用 PyInstaller 生成 Position-Independent Executable (PIE)。
      # 在 termux/termux-docker:aarch64 中构建可得到真正的 Android (bionic) PIE 二进制。
      - name: 在 Termux 中进行 Android PIE 打包
        run: |
          docker run --rm \
            --platform linux/arm64 \
            --privileged \
            -v "$(pwd):/app" \
            -w /app \
            -e APP_NAME=${{ env.APP_NAME }} \
            termux/termux-docker:aarch64 \
            bash -c '
              set -e
              # Termux 以非 root 用户运行，/tmp 不可写。显式设置 TMPDIR 为用户可写目录，
              # 确保 Python 的 tempfile、pip 构建过程、PyInstaller 均能正常创建临时文件。
              export TMPDIR="$HOME/tmp"
              mkdir -p "$TMPDIR"

              # Termux 镜像同步中偶发 Packages.bz2 大小不一致，重试 apt update。
              for i in 1 2 3 4 5; do
                apt update -y && break
                echo "apt update 第 $i 次失败，5 秒后重试..."
                sleep 5
              done
              apt install -yq python clang binutils

              python -m pip install --upgrade pip setuptools wheel packaging hatchling

              # Termux 无 ldd 命令，而 PyInstaller 的 compat.py 在 import 阶段会无条件调用 ldd 检测 musl libc，
              # 导致 FileNotFoundError。此处下载 sdist 后用 sed 打补丁将 is_musl 直接设为 False，绕过 ldd 调用。
              PYI_SRC="$HOME/pyi_src"
              mkdir -p "$PYI_SRC"
              python -m pip download --no-binary pyinstaller --no-deps "pyinstaller>=6,<7" -d "$PYI_SRC"
              tar xf "$PYI_SRC"/pyinstaller-*.tar.gz -C "$PYI_SRC"
              PYI_DIR=$(ls -d "$PYI_SRC"/pyinstaller-*/)
              sed -i "/is_musl = is_linux and/c\\is_musl = False" "${PYI_DIR}PyInstaller/compat.py"
              # 从打补丁后的源码构建，编译 bionic 版 bootloader（manylinux wheel 无法在 Termux 运行）
              python -m pip install --no-build-isolation "$PYI_DIR"

              if [ -f requirements.txt ]; then
                python -m pip install -r requirements.txt
              fi

              python -m PyInstaller "$APP_NAME.spec" \
                --distpath "/app/dist/android-arm64" \
                --workpath "/app/build/android-arm64" \
                --noconfirm

              chmod +x "/app/dist/android-arm64/$APP_NAME"
            '

      - name: 修正产物归属与权限
        run: |
          sudo chown -R 1001:121 dist
          chmod -R 755 dist/android-arm64

      - name: 验证 PIE
        run: |
          file dist/android-arm64/${{ env.APP_NAME }}
          readelf -h dist/android-arm64/${{ env.APP_NAME }} | grep -E "Type:|Machine:"

      - name: 压缩产物 (Zip)
        run: |
          cd dist/android-arm64
          zip -r "../../${{ env.APP_NAME }}-android-PIE-arm64.zip" .

      - name: 上传 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-android-PIE-arm64
          path: ${{ env.APP_NAME }}-android-PIE-arm64.zip
          retention-days: 90

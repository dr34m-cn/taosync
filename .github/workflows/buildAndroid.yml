name: 构建Android

on:
  workflow_dispatch:
    inputs:
      build_mode:
        description: 构建模式
        required: true
        default: release
        type: choice
        options:
          - debug
          - release

env:
  APP_NAME: taoSync
  BUILDOZER_VERSION: '1.5.0'
  P4A_VERSION: 'develop'
  PYTHON_VERSION: '3.11'

jobs:
  get-version:
    name: 获取版本号
    runs-on: ubuntu-latest
    outputs:
      VERSION: ${{ steps.getVersion.outputs.VERSION }}
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - id: getVersion
        name: 获取版本号
        run: |
          versions=$(head -n 1 version.txt)
          IFS=',' read -ra versionList <<< "$versions"
          echo "VERSION=${versionList[0]}" >> "$GITHUB_OUTPUT"

  build-frontend:
    name: 构建前端
    runs-on: ubuntu-latest
    needs: [ get-version ]
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 安装Node.js 14.x
        uses: actions/setup-node@v4
        with:
          node-version: "14.x"

      - name: 注入版本号并构建前端
        run: |
          sed -i "s/__version_placeholder__/${{ needs.get-version.outputs.VERSION }}/g" frontend/src/views/page/setting/index.vue
          cd frontend
          npm install
          npm run build

      - name: 上传前端产物
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  build-android:
    name: 构建Android APK
    runs-on: ubuntu-latest
    needs: [ get-version, build-frontend ]
    env:
      VERSION: ${{ needs.get-version.outputs.VERSION }}
      BUILD_MODE: ${{ github.event.inputs.build_mode || 'release' }}

    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 下载前端产物
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 安装Buildozer与python-for-android
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install \
            "buildozer==${{ env.BUILDOZER_VERSION }}" \
            "git+https://github.com/kivy/python-for-android.git@${{ env.P4A_VERSION }}" \
            cython==0.29.36 \
            virtualenv

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            autoconf \
            automake \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo5 \
            libffi-dev \
            libssl-dev \
            libbz2-dev \
            libreadline-dev \
            libsqlite3-dev \
            libxml2-dev \
            libxslt1-dev \
            libyaml-dev \
            libjpeg-dev \
            libpng-dev \
            ccache \
            openjdk-17-jdk \
            unzip \
            zip
          sudo rm -rf /var/lib/apt/lists/*

      - name: 配置Java环境
        run: |
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
          echo "$JAVA_HOME/bin" >> $GITHUB_PATH

      - name: 配置CCACHE
        run: |
          ccache --set-config=max_size=5G
          ccache --set-config=compression=true
          ccache -z
          echo "USE_CCACHE=1" >> $GITHUB_ENV
          echo "CCACHE_DIR=$HOME/.ccache" >> $GITHUB_ENV

      - name: 缓存Buildozer全局目录
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.gradle
            ~/.ccache
          key: buildozer-${{ env.BUILDOZER_VERSION }}-p4a-${{ env.P4A_VERSION }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ env.BUILDOZER_VERSION }}-p4a-${{ env.P4A_VERSION }}-
            buildozer-

      - name: 生成buildozer.spec
        run: |
          if [ ! -f buildozer.spec ]; then
            cat > buildozer.spec <<EOF
          [app]
          title = $APP_NAME
          package.name = $APP_NAME
          package.domain = org.tao
          source.dir = .
          source.include_exts = py,png,jpg,kv,atlas,txt,json,js,css,html,svg,ttf,woff,woff2,ini,cfg
          version = $VERSION
          requirements = python3,($(grep -v '^#' requirements.txt | grep -v '^$' | paste -sd, -))
          orientation = portrait
          fullscreen = 0
          android.permissions = INTERNET,ACCESS_NETWORK_STATE,WRITE_EXTERNAL_STORAGE,READ_EXTERNAL_STORAGE
          android.api = 34
          android.minapi = 24
          android.ndk = 26
          android.accept_sdk_license = True
          EOF
            echo "buildozer.spec 已自动生成"
          else
            echo "buildozer.spec 已存在，跳过生成"
          fi
          cat buildozer.spec

      - name: 执行Buildozer编译
        run: |
          if [ "$BUILD_MODE" = "release" ]; then
            buildozer android release || buildozer android debug
          else
            buildozer android debug
          fi

      - name: 收集APK产物
        run: |
          mkdir -p artifacts
          APK_DIR="bin"
          [ -d "$APK_DIR" ] || APK_DIR=".buildozer/android/platform/build-arm64-v8a/dists"
          find . -type f -name "*.apk" -print
          find . -type f -name "*.apk" -exec cp -v {} artifacts/ \;
          cd artifacts
          for apk in *.apk; do
            [ -f "$apk" ] || continue
            base="${apk%.apk}"
            mv -f "$apk" "$base-$VERSION.apk"
          done
          ls -lh

      - name: 上传APK到artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-android-${{ env.BUILD_MODE }}-${{ env.VERSION }}
          path: artifacts/*.apk
          retention-days: 90
          if-no-files-found: error

      - name: 上传构建日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: buildozer-logs-${{ env.BUILD_MODE }}
          path: |
            .buildozer/android/platform/*/build/other_builds
            **/buildozer.log
          retention-days: 7
          if-no-files-found: ignore

  create-release:
    name: 发布到release
    runs-on: ubuntu-latest
    needs: [ get-version, build-android ]
    env:
      VERSION: ${{ needs.get-version.outputs.VERSION }}
    if: ${{ !contains(needs.get-version.outputs.VERSION, 'dev') }}
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 下载APK产物
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-android-${{ github.event.inputs.build_mode || 'release' }}-${{ env.VERSION }}
          path: dist

      - name: 创建release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}-android
          files: dist/*.apk
          prerelease: ${{ contains(env.VERSION, 'dev') || contains(env.VERSION, 'pre') || contains(env.VERSION, 'beta') }}
